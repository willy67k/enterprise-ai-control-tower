services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-control_tower}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d control_tower"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "7801:7801"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/control_tower
      - ENVIRONMENT=development
      - CORS_ORIGINS=["http://localhost:7800"]
      - APP_NAME=Enterprise AI Control Tower (Docker)
      # You can override LLM keys here or via .env file
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:7801
    ports:
      - "7800:7800"
    depends_on:
      - backend

volumes:
  pgdata:
